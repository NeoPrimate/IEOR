# Book structure — single source of truth for PDF and HTML book.
#
# Schema:
#   [book]                  metadata
#   [[sections]]            top-level sections (recursive)
#     title = "..."         display title
#     files = ["a.typ", …]  optional, single page composed from one or more files
#                           paths are relative to book.src
#     [[sections.sections]] nested subsections (any depth)
#
# A section without `files` is a header-only group node (renders title only).

[book]
title   = "Industrial Engineering & Operations Research"
authors = ["Vlad"]
src     = "src"

